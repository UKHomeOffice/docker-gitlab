---
kind: pipeline
type: kubernetes
name: default

platform:
  os: linux
  arch: amd64

steps:
- name: build-image
  image: 340268328991.dkr.ecr.eu-west-2.amazonaws.com/acp/dind
  commands:
  # wait for docker service to be up before running docker build
  - n=0; while [ "$n" -lt 60 ] && [ ! "$(docker stats --no-stream)" ]; do n=$(( n + 1 )); sleep 1; done
  - docker build -t arun-gitlab:$${DRONE_COMMIT_SHA} .
  when:
    event:
    - pull_request
    - tag
    - push


- name: deploy_image
  image: 340268328991.dkr.ecr.eu-west-2.amazonaws.com/acp/dind
  commands:
  - if [[ "$${DRONE_BRANCH}" == "ACPENG-624" ]] || [[ -n "$${DRONE_TAG}" ]]; then
    echo "REPO"
    docker login -u="$${REGISTRY_USER}" -p="$${DOCKER_PASSWORD}" $${REPO};
    docker tag arun-gitlab:$${DRONE_COMMIT_SHA} $${REPO}/$${AUTHOR}/$${NAME}:$${DRONE_TAG:-latest};
    docker push $${REPO}/$${AUTHOR}/$${NAME}:$${DRONE_TAG:-latest};
    fi
  environment:
    AUTHOR: ukhomeofficedigital
    DOCKER_PASSWORD:
      from_secret: docker_gitlab_arun
    NAME: docker_gitlab_arun 
    REGISTRY_USER: ukhomeofficedigital+docker_gitlab_arun
    REPO: quay.io
  when:
    event:
    - tag
    - push

